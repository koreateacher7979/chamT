<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026년도 참마음클럽 단체티셔츠 진행 현황</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

  <!-- 로딩 화면 -->
  <div id="loading-screen" class="flex flex-col items-center justify-center min-h-screen bg-slate-50">
    <i data-lucide="refresh-cw" class="w-10 h-10 text-blue-500 animate-spin mb-4"></i>
    <p class="text-lg font-medium text-slate-600">데이터를 불러오는 중입니다...</p>
  </div>

  <!-- 메인 앱 화면 (데이터 로드 완료 후 표시됨) -->
  <div id="app-content" class="hidden p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-6">
      
      <!-- Header Section -->
      <header class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
          <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">
            2026년도 참마음클럽 단체티셔츠 진행 현황
          </h1>
          <p class="text-sm text-slate-500 mt-2 flex items-center gap-1">
            <i data-lucide="info" class="w-4 h-4"></i>
            실시간 데이터 연동 화면
          </p>
        </div>
        <div class="flex flex-col items-end gap-2">
          <span class="bg-blue-50 text-blue-700 text-sm font-semibold px-4 py-2 rounded-full border border-blue-100 shadow-sm">
            개발자 : 참마음클럽 김병찬
          </span>
          <button id="refresh-btn" class="flex items-center gap-1 text-sm text-slate-500 hover:text-blue-600 transition-colors px-2 py-1">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i> 새로고침
          </button>
        </div>
      </header>

      <!-- Error / Mock Data Warning -->
      <div id="error-banner" class="hidden bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-xl shadow-sm flex items-start gap-3">
        <i data-lucide="alert-circle" class="w-6 h-6 text-amber-500 shrink-0 mt-0.5"></i>
        <div>
          <h3 class="text-amber-800 font-bold">실시간 연동 실패</h3>
          <p id="error-message" class="text-amber-700 text-sm mt-1"></p>
          <p class="text-amber-700 text-sm font-medium mt-1">현재 화면은 <span class="underline">테스트용 예시 데이터</span>를 보여주고 있습니다.</p>
        </div>
      </div>

      <!-- Summary Cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm flex items-center gap-4">
          <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 shrink-0">
            <i data-lucide="users" class="w-6 h-6"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">총 티셔츠 신청</p>
            <p id="count-total" class="text-2xl font-bold text-slate-800">0명</p>
          </div>
        </div>
        
        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm flex items-center gap-4">
          <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-green-600 shrink-0">
            <i data-lucide="check-circle" class="w-6 h-6"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">입금 완료</p>
            <p id="count-paid" class="text-2xl font-bold text-slate-800">0명</p>
          </div>
        </div>

        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm flex items-center gap-4">
          <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center text-red-600 shrink-0">
            <i data-lucide="alert-circle" class="w-6 h-6"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">미입금</p>
            <p id="count-unpaid" class="text-2xl font-bold text-slate-800">0명</p>
          </div>
        </div>

        <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm flex items-center gap-4">
          <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 shrink-0">
            <i data-lucide="x-circle" class="w-6 h-6"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">미신청 회원</p>
            <p id="count-unrequested" class="text-2xl font-bold text-slate-800">0명</p>
          </div>
        </div>
      </div>

      <!-- Main Content Grid -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
        
        <!-- Left Column: Payment Status -->
        <div class="space-y-6">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-green-50 px-6 py-4 border-b border-green-100 flex justify-between items-center">
              <h2 class="font-bold text-green-800 flex items-center gap-2">
                <i data-lucide="check-circle" class="w-5 h-5"></i> 입금 완료 회원 명단
              </h2>
              <span id="badge-paid" class="bg-green-200 text-green-800 text-xs font-bold px-2 py-1 rounded-full">0명</span>
            </div>
            <div id="list-paid" class="p-6 flex flex-wrap gap-2"></div>
          </div>

          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-red-50 px-6 py-4 border-b border-red-100 flex justify-between items-center">
              <h2 class="font-bold text-red-800 flex items-center gap-2">
                <i data-lucide="alert-circle" class="w-5 h-5"></i> 미입금 회원 명단
              </h2>
              <span id="badge-unpaid" class="bg-red-200 text-red-800 text-xs font-bold px-2 py-1 rounded-full">0명</span>
            </div>
            <div id="list-unpaid" class="p-6 flex flex-wrap gap-2"></div>
          </div>
          
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
              <h2 class="font-bold text-slate-600 flex items-center gap-2">
                <i data-lucide="x-circle" class="w-5 h-5"></i> 미신청 회원 명단
              </h2>
              <span id="badge-unrequested" class="bg-slate-200 text-slate-700 text-xs font-bold px-2 py-1 rounded-full">0명</span>
            </div>
            <div id="list-unrequested" class="p-6 flex flex-wrap gap-2"></div>
          </div>
        </div>

        <!-- Right Column: Size Details -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <div class="bg-blue-50 px-6 py-4 border-b border-blue-100">
            <h2 class="font-bold text-blue-800 flex items-center gap-2">
              <i data-lucide="shirt" class="w-5 h-5"></i> 사이즈별 주문 및 신청자 명단
            </h2>
          </div>
          <div class="p-0 overflow-x-auto">
            <table class="w-full text-left border-collapse whitespace-nowrap lg:whitespace-normal">
              <thead>
                <tr class="bg-slate-50 text-slate-600 text-sm border-b border-slate-200">
                  <th class="py-3 px-6 font-semibold w-1/4">사이즈</th>
                  <th class="py-3 px-6 font-semibold w-1/4 text-center">주문 갯수</th>
                  <th class="py-3 px-6 font-semibold w-1/2">신청 회원명</th>
                </tr>
              </thead>
              <tbody id="table-sizes" class="divide-y divide-slate-100">
                <!-- 사이즈 테이블 데이터가 여기에 렌더링 됩니다 -->
              </tbody>
            </table>
          </div>
          <div class="bg-slate-50 p-4 border-t border-slate-200 text-xs text-slate-500 text-right flex items-center justify-end gap-2">
            <span class="w-3 h-3 bg-red-50 border border-red-100 inline-block rounded-sm"></span> 빨간색 배경은 미입금자입니다.
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // Lucide 아이콘 초기화
    lucide.createIcons();

    const SHEET_ID = '1AWdevrztSJFw2futKc7m0oyoNczIY3g9VqKPsCadg9s';
    const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    const MOCK_DATA = [
      { name: '김병찬', size: '100', isPaid: true },
      { name: '홍길동', size: '105', isPaid: false },
      { name: '이순신', size: '100', isPaid: true },
      { name: '강감찬', size: '95', isPaid: true },
      { name: '유관순', size: '', isPaid: false },
      { name: '장보고', size: '110', isPaid: false },
      { name: '신사임당', size: '90', isPaid: true },
    ];

    // CSV 파싱 함수
    function parseCSV(text) {
      const lines = text.split('\n').filter(line => line.trim() !== '');
      const result = [];
      
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        // 따옴표 안의 쉼표를 무시하고 분리하는 정규식
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
        
        const name = values[0] || '';
        const size = values[1] || '';
        const paidStr = (values[2] || '').toUpperCase();
        
        // 헤더 행이거나 이름이 없는 경우 건너뜀
        if (name === '이름' || name === '성명' || name === '회원명' || name === 'A') continue;
        if (!name) continue; 
        
        // 체크박스가 체크되어 있으면 TRUE로 인식됨
        const isPaid = paidStr === 'TRUE' || paidStr === 'O' || paidStr === 'Y';
        
        result.push({ name, size, isPaid });
      }
      return result;
    }

    // 데이터 렌더링 함수
    function renderData(data) {
      const requestedMembers = data.filter(d => d.size !== '');
      const unrequestedMembers = data.filter(d => d.size === '');
      const paidMembers = requestedMembers.filter(d => d.isPaid);
      const unpaidMembers = requestedMembers.filter(d => !d.isPaid);

      // 사이즈별 그룹화
      const groups = {};
      requestedMembers.forEach(member => {
        if (!groups[member.size]) groups[member.size] = [];
        groups[member.size].push(member);
      });
      // 사이즈 오름차순 정렬
      const sizeGroups = Object.entries(groups).sort(([a], [b]) => a.localeCompare(b, undefined, {numeric: true}));

      // 카운트 및 배지 업데이트
      document.getElementById('count-total').innerText = `${requestedMembers.length}명`;
      document.getElementById('count-paid').innerText = `${paidMembers.length}명`;
      document.getElementById('count-unpaid').innerText = `${unpaidMembers.length}명`;
      document.getElementById('count-unrequested').innerText = `${unrequestedMembers.length}명`;
      
      document.getElementById('badge-paid').innerText = `${paidMembers.length}명`;
      document.getElementById('badge-unpaid').innerText = `${unpaidMembers.length}명`;
      document.getElementById('badge-unrequested').innerText = `${unrequestedMembers.length}명`;

      // 입금 완료 명단 렌더링
      const paidHtml = paidMembers.length > 0 
        ? paidMembers.map(m => `<span class="px-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 flex items-center gap-1.5 shadow-sm">${m.name} <span class="text-xs text-slate-400 font-mono">(${m.size})</span></span>`).join('')
        : '<p class="text-sm text-slate-400">입금 완료된 회원이 없습니다.</p>';
      document.getElementById('list-paid').innerHTML = paidHtml;

      // 미입금 명단 렌더링
      const unpaidHtml = unpaidMembers.length > 0
        ? unpaidMembers.map(m => `<span class="px-3 py-1.5 bg-red-50 border border-red-100 rounded-lg text-sm text-red-700 flex items-center gap-1.5 shadow-sm">${m.name} <span class="text-xs text-red-400 font-mono">(${m.size})</span></span>`).join('')
        : '<p class="text-sm text-slate-400">미입금 회원이 없습니다. 모두 입금을 완료했습니다!</p>';
      document.getElementById('list-unpaid').innerHTML = unpaidHtml;

      // 미신청 명단 렌더링
      const unrequestedHtml = unrequestedMembers.length > 0
        ? unrequestedMembers.map(m => `<span class="px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-sm text-slate-500 shadow-sm">${m.name}</span>`).join('')
        : '<p class="text-sm text-slate-400">모든 회원이 신청을 완료했습니다.</p>';
      document.getElementById('list-unrequested').innerHTML = unrequestedHtml;

      // 사이즈 테이블 렌더링
      const tableHtml = sizeGroups.length > 0
        ? sizeGroups.map(([size, members]) => {
            const membersHtml = members.map(m => 
              `<span class="text-sm px-2 py-0.5 rounded ${m.isPaid ? 'text-slate-700 bg-slate-100' : 'text-red-600 bg-red-50 border border-red-100'}">${m.name}</span>`
            ).join('');
            
            return `
              <tr class="hover:bg-slate-50 transition-colors">
                <td class="py-4 px-6 font-bold text-slate-800">${size} <span class="text-xs font-normal text-slate-400 ml-1">호</span></td>
                <td class="py-4 px-6 text-center">
                  <span class="inline-flex items-center justify-center bg-blue-100 text-blue-800 font-bold w-8 h-8 rounded-full">${members.length}</span>
                </td>
                <td class="py-4 px-6">
                  <div class="flex flex-wrap gap-1.5">${membersHtml}</div>
                </td>
              </tr>
            `;
          }).join('')
        : `<tr><td colspan="3" class="py-8 text-center text-slate-400 text-sm">신청 내역이 없습니다.</td></tr>`;
      
      document.getElementById('table-sizes').innerHTML = tableHtml;
    }

    // 데이터 패치 함수
    async function fetchData() {
      const loadingScreen = document.getElementById('loading-screen');
      const appContent = document.getElementById('app-content');
      const errorBanner = document.getElementById('error-banner');
      
      loadingScreen.classList.remove('hidden');
      appContent.classList.add('hidden');
      errorBanner.classList.add('hidden');
      
      try {
        const response = await fetch(SHEET_CSV_URL);
        if (!response.ok) throw new Error('데이터를 불러오는데 실패했습니다.');
        
        const csvText = await response.text();
        const parsedData = parseCSV(csvText);
        
        if (parsedData.length === 0) throw new Error('데이터가 비어있습니다.');
        
        renderData(parsedData);
      } catch (err) {
        console.error('Fetch error:', err);
        document.getElementById('error-message').innerText = '구글 시트 데이터를 불러올 수 없습니다. 시트의 공유 권한이 "링크가 있는 모든 사용자에게 공개"로 되어 있는지 확인해주세요.';
        errorBanner.classList.remove('hidden');
        errorBanner.classList.add('flex');
        
        // 에러 발생 시 예시 데이터로 렌더링
        renderData(MOCK_DATA);
      } finally {
        loadingScreen.classList.add('hidden');
        appContent.classList.remove('hidden');
      }
    }

    // 이벤트 리스너 및 초기화
    document.getElementById('refresh-btn').addEventListener('click', fetchData);
    
    // 페이지 로드 시 데이터 가져오기 실행
    window.addEventListener('DOMContentLoaded', fetchData);
  </script>
</body>
</html>
