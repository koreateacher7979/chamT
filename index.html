<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참마음클럽 티셔츠 수령 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .size-card { transition: transform 0.2s; }
        .size-card:hover { transform: translateY(-2px); }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 중요: 여기에 구글 앱스 스크립트 배포 URL을 입력하세요.
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzIq2DRHCjhQBPpufz2WH565wNtE7zv-2lb8hMsCDXHslad50m1IVsG3EE_yCmrg7zo/exec"; 

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [isSyncing, setIsSyncing] = useState(false);

            const fetchData = async () => {
                try {
                    setLoading(true);
                    const response = await fetch(SCRIPT_URL);
                    const result = await response.json();
                    setData(result);
                    setError(null);
                } catch (err) {
                    setError("데이터를 불러오는데 실패했습니다. URL 설정을 확인해주세요.");
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 30000);
                return () => clearInterval(interval);
            }, []);

            // 수령여부 열이 비어있지 않은(체크박스가 있는) 유효 신청자만 필터링
            const validApplicants = useMemo(() => {
                return data.filter(item => {
                    const status = item["수령여부"];
                    // 체크박스가 없는 경우(공백) 제외
                    return status !== "" && status !== null && status !== undefined;
                });
            }, [data]);

            const handleToggle = async (rowIndex, currentStatus) => {
                const newStatus = !currentStatus;
                
                const updatedData = data.map(item => 
                    item.rowIndex === rowIndex ? { ...item, "수령여부": newStatus } : item
                );
                setData(updatedData);
                setIsSyncing(true);

                try {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ rowIndex, received: newStatus })
                    });
                    setTimeout(fetchData, 1000);
                } catch (err) {
                    console.error("업데이트 실패:", err);
                    alert("동기화 중 오류가 발생했습니다.");
                    fetchData();
                } finally {
                    setIsSyncing(false);
                }
            };

            const stats = useMemo(() => {
                const total = validApplicants.length;
                const received = validApplicants.filter(item => 
                    item["수령여부"] === true || item["수령여부"] === "TRUE" || item["수령여부"] === "checked"
                ).length;
                return { total, received, remaining: total - received };
            }, [validApplicants]);

            const groupedData = useMemo(() => {
                const filtered = validApplicants.filter(item => 
                    item["이름"]?.toString().toLowerCase().includes(searchTerm.toLowerCase())
                );
                
                return filtered.reduce((acc, item) => {
                    const size = item["사이즈"] || "기타";
                    if (!acc[size]) acc[size] = [];
                    acc[size].push(item);
                    return acc;
                }, {});
            }, [validApplicants, searchTerm]);

            if (loading && data.length === 0) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen">
                        <div className="loading-spinner mb-4"></div>
                        <p className="text-gray-600">데이터를 동기화 중입니다...</p>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto px-4 py-8">
                    {/* Header */}
                    <header className="mb-8 text-center">
                        <div className="inline-block bg-blue-600 text-white px-3 py-1 rounded-full text-sm font-semibold mb-2">
                            2026 참마음 단체 티셔츠
                        </div>
                        <h1 className="text-3xl font-bold text-gray-900 mb-2">수령 확인 대시보드</h1>
                        <p className="text-gray-500 text-sm">개발자: 참마음클럽 김병찬</p>
                    </header>

                    {/* Stats */}
                    <div className="grid grid-cols-3 gap-4 mb-8">
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                            <p className="text-xs text-gray-500 font-medium uppercase mb-1">신청 인원</p>
                            <p className="text-2xl font-bold text-gray-800">{stats.total}</p>
                        </div>
                        <div className="bg-blue-50 p-4 rounded-2xl shadow-sm border border-blue-100 text-center">
                            <p className="text-xs text-blue-600 font-medium uppercase mb-1">수령 완료</p>
                            <p className="text-2xl font-bold text-blue-700">{stats.received}</p>
                        </div>
                        <div className="bg-orange-50 p-4 rounded-2xl shadow-sm border border-orange-100 text-center">
                            <p className="text-xs text-orange-600 font-medium uppercase mb-1">미수령</p>
                            <p className="text-2xl font-bold text-orange-700">{stats.remaining}</p>
                        </div>
                    </div>

                    {/* Search & Status */}
                    <div className="flex items-center gap-4 mb-6">
                        <div className="relative flex-1">
                            <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input 
                                type="text" 
                                placeholder="이름으로 검색..."
                                className="w-full pl-10 pr-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                        <div className="text-sm font-medium">
                            {isSyncing ? (
                                <span className="text-blue-600 flex items-center gap-2">
                                    <i className="fa-solid fa-arrows-rotate animate-spin"></i> 동기화 중
                                </span>
                            ) : (
                                <span className="text-green-600 flex items-center gap-2">
                                    <i className="fa-solid fa-cloud"></i> 실시간 연결됨
                                </span>
                            )}
                        </div>
                    </div>

                    {error && (
                        <div className="bg-red-50 text-red-600 p-4 rounded-xl mb-6 flex items-start gap-3 border border-red-100">
                            <i className="fa-solid fa-circle-exclamation mt-1"></i>
                            <div>
                                <p className="font-semibold">설정이 필요합니다</p>
                                <p className="text-sm">Apps Script를 배포하고 SCRIPT_URL을 소스코드에 입력해주세요.</p>
                            </div>
                        </div>
                    )}

                    {/* Dashboard Content */}
                    <div className="space-y-8">
                        {Object.keys(groupedData).sort().map(size => (
                            <section key={size} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                <div className="bg-gray-50 px-6 py-3 border-b border-gray-100 flex justify-between items-center">
                                    <h2 className="font-bold text-gray-700">{size}</h2>
                                    <span className="text-xs bg-gray-200 px-2 py-1 rounded-full text-gray-600 font-bold">
                                        {groupedData[size].length}명
                                    </span>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-0 divide-y md:divide-y-0 md:gap-px md:bg-gray-100">
                                    {groupedData[size].map((person) => {
                                        const isReceived = person["수령여부"] === true || person["수령여부"] === "TRUE" || person["수령여부"] === "checked";
                                        return (
                                            <div 
                                                key={person.rowIndex} 
                                                onClick={() => handleToggle(person.rowIndex, isReceived)}
                                                className={`flex items-center justify-between p-4 bg-white cursor-pointer hover:bg-gray-50 transition-colors ${isReceived ? 'opacity-60' : ''}`}
                                            >
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm ${isReceived ? 'bg-gray-100 text-gray-400' : 'bg-blue-100 text-blue-600'}`}>
                                                        {person["이름"]?.substring(0, 1)}
                                                    </div>
                                                    <div>
                                                        <p className={`font-semibold ${isReceived ? 'line-through text-gray-400' : 'text-gray-800'}`}>
                                                            {person["이름"]}
                                                        </p>
                                                        <p className="text-xs text-gray-400">{size}</p>
                                                    </div>
                                                </div>
                                                <div className={`w-6 h-6 rounded-md border-2 flex items-center justify-center transition-all ${isReceived ? 'bg-blue-600 border-blue-600' : 'border-gray-300 bg-white'}`}>
                                                    {isReceived && <i className="fa-solid fa-check text-white text-xs"></i>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </section>
                        ))}
                    </div>

                    {Object.keys(groupedData).length === 0 && (
                        <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-gray-200">
                            <i className="fa-solid fa-user-slash text-4xl text-gray-200 mb-4"></i>
                            <p className="text-gray-400">검색 결과가 없거나 신청 인원이 없습니다.</p>
                        </div>
                    )}
                    
                    <footer className="mt-12 text-center text-gray-400 text-sm">
                        <p>© 2026 참마음클럽 단체티 배포 시스템</p>
                        <p className="mt-1">수령여부 열에 체크박스가 있는 인원만 표시됩니다.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
