<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단체티 불출 현황 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; }
        .size-card { transition: transform 0.2s; }
        .size-card:hover { transform: translateY(-2px); }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header Area -->
    <header class="max-w-6xl mx-auto mb-8 text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">👕 단체티 불출 현황</h1>
        <p class="text-blue-600 font-medium">개발자: 참마음클럽 김병찬</p>
        <div class="mt-4 inline-flex items-center bg-white px-4 py-2 rounded-full shadow-sm text-sm text-gray-500">
            <i class="fas fa-sync-alt mr-2" id="sync-icon"></i> 
            <span id="last-update">데이터를 불러오는 중...</span>
        </div>
    </header>

    <!-- Loading State -->
    <div id="loading" class="flex flex-col items-center justify-center py-20">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-gray-500">스프레드시트에서 명단을 가져오고 있습니다...</p>
    </div>

    <!-- Dashboard Content -->
    <main id="app" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
        <!-- 사이즈별 카드가 여기에 동적으로 생성됩니다 -->
    </main>

    <!-- Modal for feedback -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none">
        데이터가 동기화되었습니다.
    </div>

    <script>
        /**
         * ⚠️ 중요: 아래 URL에 본인의 '구글 앱 스크립트 웹 앱 URL'을 입력하세요.
         */
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCVuxbLRyfmqXp6WxIMdR-L1drSvGf16D_CFUfdHBhW6nXUQo3mSBK95CgcA7tImo/exec'; 

        let inventoryData = [];

        // 데이터 가져오기
        async function fetchData() {
            try {
                document.getElementById('sync-icon').classList.add('fa-spin');
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                inventoryData = data;
                renderDashboard();
                updateTimestamp();
            } catch (error) {
                console.error('Error fetching data:', error);
                // 테스트용 더미 데이터 (URL 설정 전 확인용)
                if (SCRIPT_URL.includes('YOUR_')) {
                    showToast("⚠️ 스크립트 URL을 설정해주세요. (테스트 데이터 표시)");
                    inventoryData = [
                        {row: 2, name: "김병찬", size: "남자 105", received: true},
                        {row: 3, name: "홍길동", size: "남자 105", received: false},
                        {row: 4, name: "이수중", size: "남자 100", received: false}
                    ];
                    renderDashboard();
                }
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('sync-icon').classList.remove('fa-spin');
            }
        }

        // 수령 여부 업데이트
        async function toggleReceived(row, currentState, checkbox) {
            const newState = !currentState;
            checkbox.disabled = true; // 중복 클릭 방지

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ row, received: newState })
                });
                
                if (response.ok) {
                    showToast(`${inventoryData.find(d => d.row === row).name}님 수령 완료!`);
                    // 로컬 데이터 업데이트
                    const item = inventoryData.find(d => d.row === row);
                    if (item) item.received = newState;
                }
            } catch (error) {
                console.error('Update failed:', error);
                showToast("❌ 동기화 실패. 다시 시도해주세요.");
                checkbox.checked = currentState; // 롤백
            } finally {
                checkbox.disabled = false;
            }
        }

        // 대시보드 렌더링
        function renderDashboard() {
            const container = document.getElementById('app');
            container.innerHTML = '';

            // 사이즈별로 그룹화
            const groups = inventoryData.reduce((acc, curr) => {
                if (!acc[curr.size]) acc[curr.size] = [];
                acc[curr.size].push(curr);
                return acc;
            }, {});

            // 사이즈 가나다순 정렬
            const sortedSizes = Object.keys(groups).sort();

            sortedSizes.forEach(size => {
                const members = groups[size];
                const receivedCount = members.filter(m => m.received).length;
                
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-md overflow-hidden size-card border border-gray-100";
                
                card.innerHTML = `
                    <div class="bg-gray-800 p-4 flex justify-between items-center text-white">
                        <h2 class="text-lg font-bold">${size}</h2>
                        <span class="text-sm bg-blue-600 px-2 py-1 rounded">${receivedCount} / ${members.length}</span>
                    </div>
                    <div class="p-2 max-h-80 overflow-y-auto">
                        <ul class="divide-y divide-gray-100">
                            ${members.map(m => `
                                <li class="flex items-center justify-between p-3 hover:bg-blue-50 transition-colors rounded-lg group">
                                    <span class="font-medium text-gray-700">${m.name}</span>
                                    <label class="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" class="w-6 h-6 rounded border-gray-300 text-blue-600 focus:ring-blue-500 transition duration-150 ease-in-out" 
                                            ${m.received ? 'checked' : ''} 
                                            onchange="toggleReceived(${m.row}, ${m.received}, this)">
                                    </label>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('last-update').innerText = `최근 동기화: ${now.toLocaleTimeString()}`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        // 초기 실행 및 30초마다 자동 갱신
        window.onload = () => {
            fetchData();
            setInterval(fetchData, 30000); 
        };
    </script>
</body>
</html>
