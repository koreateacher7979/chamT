<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단체티 불출 현황 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .size-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .line-through-custom { text-decoration: line-through; color: #94a3b8; }
        .checkbox-bounce { transform: scale(1); transition: transform 0.1s; }
        .checkbox-bounce:active { transform: scale(1.2); }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-10">

    <!-- Top Navigation / Info -->
    <header class="max-w-6xl mx-auto mb-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-gray-200 pb-6">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-black text-gray-900 tracking-tight mb-1">
                    <span class="text-blue-600">👕</span> 단체티 불출 대시보드
                </h1>
                <p class="text-gray-500 font-medium text-lg">개발자: 참마음클럽 김병찬</p>
            </div>
            <div class="flex flex-col items-center md:items-end">
                <div class="bg-white shadow-sm border border-gray-100 px-4 py-2 rounded-2xl flex items-center gap-3">
                    <i class="fas fa-sync-alt text-blue-500" id="sync-icon"></i>
                    <span id="last-update" class="text-sm font-mono text-gray-400 font-bold">데이터 대기 중...</span>
                </div>
            </div>
        </div>

        <!-- 실시간 통합 통계 섹션 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-5">
                <div class="w-14 h-14 bg-gray-100 rounded-2xl flex items-center justify-center text-gray-600 text-2xl">
                    <i class="fas fa-users"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-400 font-bold uppercase tracking-wider">전체 대상자</p>
                    <p id="stat-total" class="text-3xl font-black text-gray-800">0</p>
                </div>
            </div>
            <div class="bg-blue-600 p-6 rounded-3xl shadow-lg shadow-blue-100 flex items-center gap-5 text-white">
                <div class="w-14 h-14 bg-blue-500/50 rounded-2xl flex items-center justify-center text-white text-2xl">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div>
                    <p class="text-sm text-blue-100 font-bold uppercase tracking-wider">수령 완료</p>
                    <p id="stat-received" class="text-3xl font-black">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-5">
                <div class="w-14 h-14 bg-orange-100 rounded-2xl flex items-center justify-center text-orange-600 text-2xl">
                    <i class="fas fa-box-open"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-400 font-bold uppercase tracking-wider">남은 티셔츠</p>
                    <p id="stat-remaining" class="text-3xl font-black text-orange-600">0</p>
                </div>
            </div>
        </div>

        <!-- 진행률 바 -->
        <div class="mt-8 bg-gray-200 h-4 rounded-full overflow-hidden shadow-inner">
            <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-700 ease-out" style="width: 0%"></div>
        </div>
    </header>

    <!-- 로딩 인디케이터 -->
    <div id="loading" class="flex flex-col items-center justify-center py-24">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mb-4"></div>
        <p class="text-gray-400 font-medium animate-pulse">최신 데이터를 동기화하고 있습니다...</p>
    </div>

    <!-- 대시보드 리스트 -->
    <main id="app" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
        <!-- 사이즈별 카드가 생성되는 곳 -->
    </main>

    <!-- 알림 토스트 -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-900/90 backdrop-blur-md text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-50 flex items-center gap-3 font-medium">
        <i class="fas fa-info-circle text-blue-400"></i>
        <span id="toast-msg">데이터가 동기화되었습니다.</span>
    </div>

    <script>
        // 구글 앱 스크립트 배포 URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCVuxbLRyfmqXp6WxIMdR-L1drSvGf16D_CFUfdHBhW6nXUQo3mSBK95CgcA7tImo/exec'; 

        let inventoryData = [];

        // 데이터 로드
        async function fetchData() {
            try {
                const icon = document.getElementById('sync-icon');
                icon.classList.add('fa-spin');
                
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                inventoryData = data;
                renderDashboard();
                updateTimestamp();
                
                icon.classList.remove('fa-spin');
            } catch (error) {
                console.error('Fetch error:', error);
                showToast("⚠️ 데이터를 가져오는데 실패했습니다.", "error");
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            }
        }

        // 수령 여부 업데이트 (즉시 동기화 로직)
        async function toggleReceived(row, checkbox, nameElementId) {
            const isChecked = checkbox.checked;
            const itemIndex = inventoryData.findIndex(d => d.row === row);
            const originalState = inventoryData[itemIndex].received;
            const userName = inventoryData[itemIndex].name;
            const nameEl = document.getElementById(nameElementId);

            // [핵심] 즉시 UI 반영 (Optimistic Update)
            inventoryData[itemIndex].received = isChecked;
            if (isChecked) {
                nameEl.classList.add('line-through-custom');
            } else {
                nameEl.classList.remove('line-through-custom');
            }
            
            updateStatsUI(); // 상단 카운트 즉시 갱신
            updateCardHeader(inventoryData[itemIndex].size); // 카드 뱃지 즉시 갱신

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ row, received: isChecked })
                });
                
                if (response.ok) {
                    showToast(`${userName}님 ${isChecked ? '수령 처리' : '취소'} 완료`);
                } else {
                    throw new Error("Sync failed");
                }
            } catch (error) {
                console.error('Update failed:', error);
                showToast("❌ 서버 동기화 실패. 다시 시도해주세요.", "error");
                
                // 에러 발생 시 롤백
                inventoryData[itemIndex].received = originalState;
                checkbox.checked = originalState;
                if (originalState) nameEl.classList.add('line-through-custom');
                else nameEl.classList.remove('line-through-custom');
                updateStatsUI();
                updateCardHeader(inventoryData[itemIndex].size);
            }
        }

        // 전체 통계 및 진행률 바 업데이트
        function updateStatsUI() {
            const total = inventoryData.length;
            const received = inventoryData.filter(m => m.received).length;
            const remaining = total - received;
            const percent = total > 0 ? (received / total) * 100 : 0;

            document.getElementById('stat-total').innerText = `${total.toLocaleString()}명`;
            document.getElementById('stat-received').innerText = `${received.toLocaleString()}명`;
            document.getElementById('stat-remaining').innerText = `${remaining.toLocaleString()}명`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        // 특정 카드 헤더의 뱃지 업데이트
        function updateCardHeader(size) {
            const members = inventoryData.filter(m => m.size === size);
            const receivedCount = members.filter(m => m.received).length;
            const badgeId = `badge-${size.replace(/\s+/g, '-')}`;
            const badge = document.getElementById(badgeId);
            if (badge) {
                badge.innerText = `${receivedCount} / ${members.length}`;
                if (receivedCount === members.length) {
                    badge.classList.replace('bg-blue-600', 'bg-green-600');
                } else {
                    badge.classList.replace('bg-green-600', 'bg-blue-600');
                }
            }
        }

        // 대시보드 전체 렌더링
        function renderDashboard() {
            updateStatsUI();
            const container = document.getElementById('app');
            container.innerHTML = '';

            const groups = inventoryData.reduce((acc, curr) => {
                if (!acc[curr.size]) acc[curr.size] = [];
                acc[curr.size].push(curr);
                return acc;
            }, {});

            const sortedSizes = Object.keys(groups).sort();

            sortedSizes.forEach(size => {
                const members = groups[size];
                const receivedCount = members.filter(m => m.received).length;
                const sizeId = size.replace(/\s+/g, '-');
                const isAllReceived = receivedCount === members.length;
                
                const card = document.createElement('div');
                card.className = "bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden size-card flex flex-col";
                
                card.innerHTML = `
                    <div class="bg-gray-900 p-5 flex justify-between items-center text-white">
                        <h2 class="text-xl font-bold tracking-tight">${size}</h2>
                        <span id="badge-${sizeId}" class="text-sm font-mono font-bold px-3 py-1 rounded-full ${isAllReceived ? 'bg-green-600' : 'bg-blue-600'} transition-colors duration-500">
                            ${receivedCount} / ${members.length}
                        </span>
                    </div>
                    <div class="p-3 max-h-[450px] overflow-y-auto">
                        <ul class="space-y-1">
                            ${members.map((m, idx) => {
                                const elId = `name-${sizeId}-${idx}`;
                                return `
                                <li class="flex items-center justify-between p-4 hover:bg-gray-50 rounded-2xl transition-all group">
                                    <span id="${elId}" class="font-bold text-gray-700 ${m.received ? 'line-through-custom' : ''}">
                                        ${m.name}
                                    </span>
                                    <input type="checkbox" 
                                        class="checkbox-bounce w-7 h-7 rounded-xl border-2 border-gray-200 text-blue-600 focus:ring-0 cursor-pointer transition-all" 
                                        ${m.received ? 'checked' : ''} 
                                        onchange="toggleReceived(${m.row}, this, '${elId}')">
                                </li>
                            `}).join('')}
                        </ul>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateTimestamp() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                          now.getMinutes().toString().padStart(2, '0') + ':' + 
                          now.getSeconds().toString().padStart(2, '0');
            document.getElementById('last-update').innerText = `최근 동기화: ${timeStr}`;
        }

        function showToast(msg, type = "success") {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.innerText = msg;
            
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -20px)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0)';
            }, 2500);
        }

        // 초기 실행 및 30초 주기 자동 갱신
        window.onload = () => {
            fetchData();
            setInterval(fetchData, 30000); 
        };
    </script>
</body>
</html>
